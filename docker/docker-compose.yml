version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:15-alpine\n    container_name: video-gen-postgres\n    environment:\n      POSTGRES_DB: video_gen_db\n      POSTGRES_USER: postgres\n      POSTGRES_PASSWORD: postgres\n    ports:\n      - \"5432:5432\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U postgres\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  redis:\n    image: redis:7-alpine\n    container_name: video-gen-redis\n    ports:\n      - \"6379:6379\"\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  backend:\n    build:\n      context: .\n      dockerfile: docker/Dockerfile.backend\n    container_name: video-gen-backend\n    ports:\n      - \"3000:3000\"\n    environment:\n      NODE_ENV: production\n      PORT: 3000\n      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/video_gen_db\n      REDIS_URL: redis://redis:6379\n      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}\n      CORS_ORIGIN: http://localhost:5173\n    depends_on:\n      postgres:\n        condition: service_healthy\n      redis:\n        condition: service_healthy\n    volumes:\n      - ./backend/src:/app/src\n    command: npm run dev\n\n  frontend:\n    build:\n      context: .\n      dockerfile: docker/Dockerfile.frontend\n    container_name: video-gen-frontend\n    ports:\n      - \"80:80\"\n    environment:\n      VITE_API_URL: http://localhost:3000/api\n    depends_on:\n      - backend\n\nvolumes:\n  postgres_data:\n\nnetworks:\n  default:\n    name: video-gen-network\n"